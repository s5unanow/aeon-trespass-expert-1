name: Python Tests

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy apps/pipeline/src packages/schemas/python

      - name: Import layer contracts
        run: uv run lint-imports

      - name: File length check
        run: uv run python scripts/check_file_length.py

      - name: Install Node (for TS codegen check)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm && pnpm install

      - name: Check codegen freshness
        run: bash scripts/check_codegen_fresh.sh

      - name: Test
        run: uv run pytest --tb=short
