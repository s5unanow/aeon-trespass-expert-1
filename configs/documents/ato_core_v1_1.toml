# ATO Core Rulebook v1.1 — the real source document.

[document]
id = "ato_core_v1_1"
source_pdf = "materials/ATO_CORE_Rulebook_v1.1.pdf"
source_lang = "en"
target_langs = ["ru"]

[symbols]
catalog = "configs/symbols/ato_core_v1_1.symbols.toml"

[extraction.layout]
dpi = 200

[render.page_overrides.p0006]
presentation_mode = "facsimile"
title = "Components (continued)"
facsimile_annotations = false

[render.page_overrides.p0007]
presentation_mode = "facsimile"
title = "Components"
facsimile_annotation_keep_texts = [
    "Primordial Sheets",
    "AI Cards",
    "BP Cards",
    "Divider Cards",
    "Secret Envelopes",
    "Argonaut Cards",
    "Pattern Cards",
    "1901 Cards",
    "Card Game",
    "Small Square",
]

[structure]
# ATO Core uses denser layouts — lower footer threshold
footer_y_threshold = 785.0
