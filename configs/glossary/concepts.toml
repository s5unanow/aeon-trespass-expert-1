# Concept registry — terminology rules for ATO Core Rulebook translation.
# Each concept defines English→Russian translation constraints:
# - forbidden_targets: translations that must NEVER be used
# - allowed_surface_forms: all acceptable Russian inflections
# - icon_binding: links a concept to its inline icon symbol_id
#
# Translation philosophy:
#   - Standard board-game terms → established Russian equivalents
#   - Mythological proper nouns → established Russian forms (Аргонавт, Титан)
#   - Game-specific invented names → transliterate (Мойрос, Мнемос)
#   - Stat/resource names → meaningful Russian words (Опасность, not Дэнджер)

version = "glossary.2026-03-17.2"

# =============================================================================
# TRISKELION STATS — the three Triskelion dial stats
# =============================================================================

[[concepts]]
concept_id = "concept.danger"
kind = "icon_term"
icon_binding = "sym.danger"
forbidden_targets = ["Дэнджер", "Угроза"]
notes = "Triskelion stat (Mortal axis). Translated as meaningful Russian word."

[concepts.source]
lang = "en"
lemma = "Danger"
aliases = ["danger stat", "Danger value"]
patterns = ["Danger", "gain Danger", "lose Danger", "your Danger", "raise Danger"]

[concepts.target]
lang = "ru"
lemma = "Опасность"
allowed_surface_forms = ["Опасность", "Опасности", "Опасностью"]

[[concepts]]
concept_id = "concept.fate"
kind = "icon_term"
