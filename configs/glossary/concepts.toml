# Concept registry — terminology rules for ATO Core Rulebook translation.
# Each concept defines English→Russian translation constraints:
# - forbidden_targets: translations that must NEVER be used
# - allowed_surface_forms: all acceptable Russian inflections
# - icon_binding: links a concept to its inline icon symbol_id

version = "glossary.2026-03-16.1"

# =============================================================================
# TRISKELION STATS — the three Triskelion dial stats
# =============================================================================

[[concepts]]
concept_id = "concept.danger"
kind = "icon_term"
icon_binding = "sym.danger"
forbidden_targets = ["Опасность"]
notes = "Triskelion stat (Mortal axis). Always transliterated, never translated."

[concepts.source]
lang = "en"
lemma = "Danger"
aliases = ["danger stat", "Danger value"]
patterns = ["Danger", "gain Danger", "lose Danger", "your Danger", "raise Danger"]

[concepts.target]
lang = "ru"
lemma = "Дэнджер"
allowed_surface_forms = ["Дэнджер", "Дэнджера", "Дэнджеру", "Дэнджером", "Дэнджере"]

[[concepts]]
concept_id = "concept.fate"
kind = "icon_term"
icon_binding = "sym.fate"
forbidden_targets = ["Судьба", "Рок"]
notes = "Triskelion stat (Divine axis). Always transliterated, never translated."

[concepts.source]
lang = "en"
lemma = "Fate"
aliases = ["Fate stat", "Fate value", "Fate Re-roll", "Fate re-rolls"]
patterns = ["Fate", "gain Fate", "spend Fate", "your Fate", "gaining Fate"]

[concepts.target]
lang = "ru"
lemma = "Фэйт"
allowed_surface_forms = ["Фэйт", "Фэйта", "Фэйту", "Фэйтом", "Фэйте"]

[[concepts]]
concept_id = "concept.rage"
kind = "icon_term"
icon_binding = "sym.rage"
forbidden_targets = ["Гнев", "Бешенство"]
notes = "Triskelion stat (Titan axis). Always transliterated, never translated."

[concepts.source]
lang = "en"
lemma = "Rage"
aliases = ["Rage stat", "Rage value"]
patterns = ["Rage", "gain Rage", "your Rage", "Rage becomes"]

[concepts.target]
lang = "ru"
lemma = "Рэйдж"
allowed_surface_forms = ["Рэйдж", "Рэйджа", "Рэйджу", "Рэйджем", "Рэйдже"]

