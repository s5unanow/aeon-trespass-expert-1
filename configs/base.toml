# Base configuration — shared defaults for all documents and environments.

artifact_root = "artifacts"

[pipeline]
version = "0.1.0"
parallelism = 4
review_threshold = 0.80

[extraction.native]
engine = "pymupdf"

[extraction.layout]
primary = "docling"
hard_fallback = "paddleocr"
dpi = 300

[symbols]
match_threshold = 0.93

[translation]
provider = "gemini"
model_default = "gemini-2.5-flash"
model_hard = "gemini-2.5-flash"
fallback_provider = "openai"
fallback_model = "gpt-4o"
temperature = 0.0
batch_size = 24
prompt_profile = "translate_rules_ru.v1"

[qa]
block_publish_on = ["error", "critical"]
