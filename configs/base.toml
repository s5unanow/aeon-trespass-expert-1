# Base configuration — shared defaults for all documents and environments.

artifact_root = "artifacts"

[pipeline]
version = "0.1.0"
parallelism = 4
review_threshold = 0.80

[extraction.native]
engine = "pymupdf"

[extraction.raster]
pyramid_dpi = [150, 300]

[extraction.layout]
primary = "docling"
hard_fallback = "paddleocr"
dpi = 300

[symbols]
match_threshold = 0.93

[translation]
provider = "gemini-cli"
model_default = "gemini-2.5-flash"
model_hard = "gemini-2.5-flash"
fallback_provider = "gemini"
fallback_model = "gemini-2.5-flash"
temperature = 0.0
batch_size = 24
prompt_profile = "translate_rules_ru.v1"

[structure]
heading_fonts = ["GreenleafLightPro", "Goobascript"]
decorative_fonts = ["GreenleafBannersRegularL"]
body_font = "Adonis-Regular"
bold_font = "Adonis-Bold"
italic_font = "Adonis-Italic"
bold_italic_font = "Adonis-BoldItalic"
dingbat_font = "ITCZapfDingbatsMedium"
footer_y_threshold = 790.0
heading_min_size = 8.0
subheading_bold_min_size = 10.0
body_size_min = 7.5
body_size_max = 10.0
paragraph_gap_factor = 1.5
paragraph_gap_abs = 12.0
figure_min_width_pt = 100.0
figure_min_height_pt = 100.0
gutter_min_width_pt = 10.0
full_width_fraction = 0.85
band_gap_min_pt = 15.0
furniture_top_max_y = 60.0
furniture_bottom_min_y = 750.0

[qa]
block_publish_on = ["error", "critical"]
