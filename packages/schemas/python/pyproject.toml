[project]
name = "atr-schemas"
version = "0.1.0"
description = "Shared Pydantic v2 schemas for the ATR pipeline"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["atr_schemas"]
